name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/package-lock.json

      - name: Install examples deps (builds tinyfft from source via postinstall)
        working-directory: examples
        run: npm ci

      - name: Verify lib/tinyfft was populated
        run: |
          test -f examples/lib/tinyfft/dist/index.js
          test -f examples/lib/tinyfft/dist/tinyfft.wasm

      - name: Build Pages tree
        run: |
          mkdir -p dist-pages/examples
          cp -r examples/spectrum-viewer dist-pages/examples/
          cp -r examples/image-filter dist-pages/examples/
          cp -r examples/convolution-reverb dist-pages/examples/
          mkdir -p dist-pages/examples/lib/tinyfft/dist
          cp examples/lib/tinyfft/dist/index.js examples/lib/tinyfft/dist/tinyfft.wasm dist-pages/examples/lib/tinyfft/dist/
          cp .github/pages-index.html dist-pages/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
