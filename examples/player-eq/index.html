<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FFT Equalizer Player · tinyfft</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: #0e0e10;
        color: #e6e6e6;
        min-height: 100vh;
      }
      header {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid #1f1f24;
        display: flex;
        gap: 1rem;
        align-items: center;
      }
      h1 {
        font-size: 0.95rem;
        font-weight: 600;
        margin: 0;
      }
      header small {
        color: #777;
        font-size: 0.8rem;
      }
      main {
        padding: 1.5rem;
        max-width: 1100px;
        margin: 0 auto;
      }
      label.drop {
        display: block;
        border: 1px dashed #2a2a30;
        border-radius: 10px;
        padding: 1.5rem;
        text-align: center;
        color: #888;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }
      label.drop:hover,
      label.drop.hover {
        background: #16161a;
        border-color: #6c79ff;
        color: #d8d8e0;
      }
      label.drop input {
        display: none;
      }
      label.drop b {
        color: #c8c8d0;
      }
      #status {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.82rem;
        color: #888;
        margin-top: 0.85rem;
      }
      #info {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 0.4rem 1.5rem;
        font-size: 0.82rem;
        color: #999;
        margin-top: 0.6rem;
      }
      #info b {
        color: #e6e6e6;
        font-weight: 600;
      }
      .player {
        display: flex;
        gap: 1rem;
        align-items: center;
        margin-top: 1rem;
        padding: 0.75rem 1rem;
        background: #16161a;
        border-radius: 8px;
      }
      .player button {
        background: #6c79ff;
        color: white;
        border: none;
        border-radius: 6px;
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
        cursor: pointer;
        font-weight: 600;
      }
      .player button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .player input[type="range"] {
        flex: 1;
        accent-color: #6c79ff;
      }
      #time {
        font-family: ui-monospace, monospace;
        font-size: 0.82rem;
        color: #aaa;
        min-width: 8em;
        text-align: right;
      }
      #curve-wrap {
        margin-top: 1rem;
        background: #050505;
        border-radius: 6px;
        padding: 0.5rem;
      }
      #curve {
        display: block;
        width: 100%;
        height: 100px;
      }
      .bands {
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        gap: 0.5rem;
        margin-top: 1rem;
        padding: 1rem 0.5rem;
        background: #16161a;
        border-radius: 8px;
      }
      .band {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.7rem;
        color: #888;
      }
      .band .freq {
        color: #aaa;
        font-family: ui-monospace, monospace;
      }
      .band .db {
        color: #e6e6e6;
        font-family: ui-monospace, monospace;
        min-width: 3.5em;
        text-align: center;
      }
      .band input[type="range"] {
        writing-mode: vertical-lr;
        direction: rtl;
        appearance: slider-vertical;
        -webkit-appearance: slider-vertical;
        width: 24px;
        height: 140px;
        accent-color: #6c79ff;
      }
      .controls {
        display: flex;
        gap: 1rem;
        align-items: center;
        margin-top: 1rem;
        font-size: 0.85rem;
        color: #aaa;
      }
      .controls button {
        background: #2a2a30;
        color: #e6e6e6;
        border: none;
        border-radius: 6px;
        padding: 0.4rem 0.9rem;
        cursor: pointer;
      }
      .controls button:hover {
        background: #3a3a44;
      }
      .controls label {
        display: inline-flex;
        gap: 0.4rem;
        align-items: center;
        cursor: pointer;
      }
      .controls input[type="checkbox"] {
        accent-color: #6c79ff;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>FFT Equalizer Player</h1>
      <small>tinyfft · 10-band overlap-add EQ</small>
    </header>
    <main>
      <label class="drop" id="drop">
        <input type="file" id="file" accept="audio/*" />
        <div>Drop an <b>audio file</b> here, or click to choose</div>
      </label>
      <div id="status">Loading WASM...</div>
      <div id="info"></div>

      <div class="player">
        <button id="play" disabled>▶ Play</button>
        <input type="range" id="seek" min="0" max="100" value="0" step="0.01" disabled />
        <span id="time">0:00 / 0:00</span>
      </div>

      <div id="curve-wrap">
        <canvas id="curve"></canvas>
      </div>

      <div class="bands" id="bands"></div>

      <div class="controls">
        <button id="reset">Flat</button>
        <label><input type="checkbox" id="bypass" /> Bypass</label>
        <span id="render-info"></span>
      </div>
    </main>
    <script type="importmap">
      {
        "imports": {
          "tinyfft": "../lib/tinyfft/dist/index.js"
        }
      }
    </script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
